{% extends 'base.html' %}
{% load static %}
{% block content %}

<!-- ========================= SECTION MAIN ========================= -->
<section class="section-intro padding-y-sm">
<div class="container">

<div class="intro-banner-wrap">
	<img src="{% static 'images/banners/1.jpg' %}" class="img-fluid rounded">
</div>

</div> <!-- container //  -->
</section>
<!-- ========================= SECTION MAIN END// ========================= -->

<!-- ========================= SECTION  ========================= -->
<section class="section-name padding-y-sm">
<div class="container">

<header class="section-heading">
	<a href="./store.html" class="btn btn-outline-primary float-right">See all</a>
	<h3 class="section-title">Popular products</h3>
</header><!-- sect-heading -->

	
<div class="row">
	{% for produto in produtos %}
	<div class="col-md-3">
		<div class="card card-product-grid">
			<a href="{{ produto.get_url }}" class="img-wrap">
				{% if produto.imagem %}
					<img src="{{ produto.imagem.url }}">
				{% else %}
					<img src="{% static 'images/logo.png' %}">
				{% endif %}
			</a>
			<figcaption class="info-wrap">
				<a href="{{ produto.get_url }}" class="title">{{ produto.nome }}</a>
				<div class="price mt-1">${{ produto.preco|floatformat:2 }}</div> <!-- price-wrap.// -->
			</figcaption>
		</div>
	</div> <!-- col.// -->
	{% endfor %}
</div> <!-- row.// -->

</div><!-- container // -->
</section>
<!-- ========================= SECTION  END// ========================= -->

</body>
</html>
{% endblock %}
